settings:
  choose_installation: "<emoji document_id=5363805650327450240>🪐</emoji> <b>Где ставить?</b>"
  vds_install: "<emoji document_id=5471952986970267163>💎</emoji> На VDS:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Если нет sudo, убери его.</i>"
  wsl_install: "<b>WSL.</b> PowerShell (админ): <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Надо Windows 10 (2004+) или 11.</i>\n\n⬜️ <b>Ребутни комп и открой Ubuntu 22.04.x</b> \n\n⬜️ <b>Вставь:</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>Если ругается, пиши</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code>\n\n⬜️ <b>Вставь:</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>API_ID и API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Видос</a>"
  userland_install: "<b>Качай UserLAnd:</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">ссылка</a>\n\n<b>Открывай, тыкай Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Жди</b>\n\n<b>Как откроется консоль, пиши:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>В конце будет ссылка, переходи и логинься.</b>"
  jamhost_install: "🪐 <b>JamHost:</b>\n\n<b>Иди в @jamhostbot, пиши </b><code>/pay</code><b> и делай че он скажет.</b>"
  hikkahost_install: "<b>🌘 HikkaHost:</b>\n\n1. Иди в @hikkahost_bot\n2. Жми «Установить»\n3. Жми «🪐 Heroku»\n\nИ делай дальше.\n\n<b>Получишь ссылку, логинься.</b>"
  lavhost_install: "⬇️ lavHost:\n\n• Иди в @lavhostbot, пиши /buy, плати\n• Кидай чек если надо\n• Потом /install и выбирай Heroku\n• Делай че бот скажет"
