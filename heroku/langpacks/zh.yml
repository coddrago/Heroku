  desc: "<emoji document_id=5188377234380954537>🪐</emoji> <b>什么是 Userbot？</b>\n\n<emoji document_id=5472238129849048175>😎</emoji> Userbot 是一个<b>第三方程序</b>，它与 Telegram API 交互以执行<b>代表用户的自动化任务</b>。用户机器人可用于自动化各种任务，例如<b>发送消息、加入频道、下载媒体文件等</b>。\n\n<emoji document_id=5474667187258006816>😎</emoji> 用户机器人与 Telegram 中的普通机器人不同，因为<b>它们在用户账户上运行</b>，而不是在机器人账户上。这意味着它们可以访问更多功能，并且在执行操作方面具有更大的灵活性。\n\n<emoji document_id=5472267631979405211>🚫</emoji> 但是，需要注意的是，<b>用户机器人不受 Telegram 官方支持</b>，并且使用它们可能会违反平台的使用条款。因此，<b>用户在使用它们时应谨慎</b>，并确保他们的账户上不运行恶意代码。\n\n"
  no_font: "<emoji document_id=5465665476971471368>❌</emoji> 字体的链接或回复在哪里？"
  font_installed: "<emoji document_id=5436040291507247633>🎉</emoji> <b>字体已安装！</b>\n<emoji document_id=5436040291507247633>🎉</emoji> <i>现在您可以愉快地使用它。</i>"
  incorrect_format_font: "<emoji document_id=5465665476971471368>❌</emoji> <b>字体格式不正确！</b>\n<blockquote>支持的格式 -> otf, ttf</blockquote>"
