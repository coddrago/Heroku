settings:
  name: "设置"
  vds: "💎 VDS"
  wsl: "💻 WSL"
  userland: "🐧 UserLand"
  jamhost: "🧃 JamHost"
  hikkahost: "🌼 HikkaHost"
  lavhost: "✌️ lavHost"
  choose_installation: "<emoji document_id=5363805650327450240>🪐</emoji> <b>选择你的 Heroku 安装选项：</b>"
  vds_install: "<emoji document_id=5471952986970267163>💎</emoji> VDS 上的安装过程通过一条命令完成：\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>注意：如果你没有 sudo 权限，请省略命令的相应部分。</i>"
  wsl_install: "<b>下载 WSL。</b> 为此，请以管理员身份打开 PowerShell 并输入 <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>要安装 WSL，你需要 Windows 10 build 2004 或任何版本的 Windows 11 以及支持虚拟化的 PC。关于早期版本的安装，请参考</i> <a href=\"https://learn.microsoft.com/zh-cn/windows/wsl/install-manual\">此页面</a>\n\n⬜️ <b>重启你的 PC 并启动 Ubuntu 22.04.x 应用程序</b> \n\n⬜️ <b>在其中粘贴命令（右键单击）：</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>如果出现黄色警告，输入</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>将 /home/username/.local/bin 替换为消息中提到的路径</i>\n\n⬜️ <b>粘贴命令（右键单击）：</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>在哪里获取 API_ID 和 API_HASH？</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">视频</a>"
  userland_install: "<b>从此</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">链接</a> <b>安装 UserLAnd</b>\n\n<b>打开它，选择 Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>等待发行版安装，你可以去倒杯茶</b>\n\n<b>安装成功后，终端将打开，在其中输入：</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>安装结束时，将出现一个链接，点击它并输入你的账户详细信息以登录。\n\nVoilà! 你已在 UserLAnd 上安装了 Heroku。</b>"
  jamhost_install: "🪐 <b>在 🧃 JamHost 上安装：</b>\n\n<b>前往 @jamhostbot，输入 </b><code>/pay</code><b> 并按照其说明操作。</b>"
  hikkahost_install: "<b>🌘 如何在 HikkaHost 上安装 Heroku？</b>\n\n1. 前往 @hikkahost_bot\n2. 选择 \"安装\"\n3. 选择 \"🪐 Heroku\"\n\n并继续安装。\n\n<b>之后，你将收到一个链接，打开它并登录你的账户。</b>"
  lavhost_install: "⬇️ 要安装，只需前往 @lavhostbot 并按照以下步骤操作：\n\n• 输入 /buy 指令，选择并支付账单\n• 如有必要，发送付款收据\n• 确认付款后，输入 /install 并选择 Heroku\n• 按照机器人的说明操作"
  too_many_args: "<emoji document_id=5210952531676504517>🚫</emoji> <b>参数过多</b>"
  blacklisted: "<emoji document_id=5197474765387864959>👍</emoji> <b>聊天 {} 已被 Userbot 列入黑名单</b>"
