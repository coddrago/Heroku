settings:
  choose_installation: "<emoji document_id=5363805650327450240>🪐</emoji> <b>选择 Heroku 的安装方式：</b>"
  vds_install: "<emoji document_id=5471952986970267163>💎</emoji> VDS 上的安装过程可以通过一条命令完成：\n<pre><code class=\"language-shell\">sudo apt update && sudo apt upgrade -y && sudo apt install git python3-pip && git clone https://github.com/coddrago/Heroku && cd Heroku && pip install -r requirements.txt && python3 -m heroku</code></pre>\n<i>注意：如果您没有 sudo 权限，请排除命令中的相应部分。</i>"
  wsl_install: "<b>下载 WSL。</b> 为此，请以管理员身份打开 PowerShell 并输入 <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>安装 WSL 需要 Windows 10 build 2004 或 Windows 11 的任何版本以及支持虚拟化的 PC。要在较旧的操作系统版本上安装，请参阅</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">此页面</a>\n\n⬜️ <b>重新启动 PC 并启动 Ubuntu 22.04.x 应用程序</b> \n\n⬜️ <b>粘贴命令（右键单击）：</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>出现黄色警告时，输入</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>将 /home/username/.local/bin 替换为消息中提到的路径</i>\n\n⬜️ <b>粘贴命令（右键单击）：</b> \n<pre><code class=\"language-bash\">clear && git clone https://github.com/coddrago/Heroku && cd Heroku && pip install -r requirements.txt && python3 -m heroku</code></pre>\n🔗 <b>如何获取 API_ID 和 API_HASH？</b>：<a href=\"https://youtu.be/DcqDA249Lhg?t=24\">视频</a>"
  userland_install: "<b>通过</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">链接</a> <b>安装 UserLAnd</b>\n\n<b>打开它，选择 Ubuntu → Minimal → Terminal</b>\n\n<b>等待分发安装，您可以泡杯茶</b>\n\n<b>安装成功后，终端将打开，输入：</b>\n<pre><code class=\"language-bash\">sudo apt update && sudo apt upgrade -y && sudo apt install python3 git python3-pip -y && git clone https://github.com/coddrago/Heroku && cd Heroku && sudo pip install -r requirements.txt && python3 -m heroku</code></pre>\n\n<b>安装结束时将出现一个链接，转到该链接并输入您的账户数据以登录。\n\nVoilà！您已在 UserLAnd 上安装了 Heroku。</b>"
  jamhost_install: "🪐 <b>在 🧃 JamHost 上安装：</b>\n\n<b>转到 @jamhostbot，发送 </b><code>/pay</code><b> 并按照进一步的说明进行操作。</b>"
  hikkahost_install: "<b>🌘 如何在 HikkaHost 上安装 Heroku？</b>\n\n1. 转到 @hikkahost_bot\n2. 选择「安装」\n3. 选择「🪐 Heroku」\n\n然后继续安装。\n\n<b>之后，您将收到一个链接，打开它并登录到您的账户。</b>"
  lavhost_install: "⬇️ 要安装，只需转到 @lavhostbot 并执行以下步骤：\n\n• 输入命令 /buy，选择并支付账单\n• 如有必要，发送付款收据\n• 付款确认后，输入 /install 并选择 Heroku\n• 按照机器人的说明进行操作"
  too_many_args: "<emoji document_id=5210952531676504517>🚫</emoji> <b>参数过多</b>"
  blacklisted: "<emoji document_id=5197474765387864959>👍</emoji> <b>聊天 {} 已添加到用户机器人的黑名单</b>"
