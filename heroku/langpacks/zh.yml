  desc: "<emoji document_id=5188377234380954537>🪐</emoji> <b>Userbot — 它是什么？</b>\n\n<emoji document_id=5472238129849048175>😎</emoji> Userbot 指的是一个<b>第三方程序</b>，它与 Telegram API 交互以代表用户执行<b>自动化任务</b>。这些 Userbot 可用于自动化各种任务，如<b>发送消息、加入频道、下载媒体等</b>。\n\n<emoji document_id=5474667187258006816>😎</emoji> Userbot 与常规 Telegram 机器人不同，因为<b>它们在用户账户上运行</b>而不是机器人账户。这意味着 Userbot 可以访问更多功能，并且在执行操作方面具有更大的灵活性。\n\n<emoji document_id=5472267631979405211>🚫</emoji> 但是，需要注意的是，<b>Userbot 不受 Telegram 官方支持</b>，其使用可能会违反平台的服务条款。因此，<b>用户在使用 Userbot 时应谨慎行事</b>，并确保它们未被用于恶意目的。\n\n"
