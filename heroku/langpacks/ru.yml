b><tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> Stderr:</b>\n<pre><code class=\"language-stderr\">"\n  end: "</code></pre>"\n  time_exec: "\n<tg-emoji emoji-id=5134202243486057363>💫</tg-emoji> <b>Время выполнения: {}s</b>"\n  auth_fail: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Аутентификация неуспешна, попробуй еще раз</b>"\n  auth_needed: '<tg-emoji emoji-id=5472308992514464048>🔐</tg-emoji><a href="tg://user?id={}"> Необходима аутентификация</a>'\n  auth_msg: "<tg-emoji emoji-id=5472308992514464048>🔐</tg-emoji> <b>Пожалуйста, отредактируй это сообщение с паролем от рута для</b> <code>{}</code> <b>, чтобы выполнить</b> <code>{}</code>"\n  auth_locked: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Аутентификация не удалась. Попробуй позже</b>"\n  auth_ongoing: "<tg-emoji emoji-id=5213452215527677338>⏳</tg-emoji> <b>Аутентификация...</b>"\n  done: "<tg-emoji emoji-id=5314250708508220914>✅</tg-emoji> <b>Ура</b>"\n  dangerous_command: "<tg-emoji emoji-id=5454225457916420314>😖</tg-emoji> <b>Выполнение этой команды(<code>{}</code>) было отменено ради вашей безопасности.</b>\n\n<tg-emoji emoji-id=5472146462362048818>💡</tg-emoji><i> Это не ошибка, а мера безопасности. Не сообщайте о ней в support чате</i>"\n  _cmd_doc_apt: "Сокращение для '.terminal apt'"\n  _cmd_doc_terminal: "<команда> - Запустить команду в системе"\n  _cmd_doc_terminate: "[-f to force kill] - Ответьте на сообщение, чтобы убить процесс"\n\nheroku_web:\n  privacy_leak: "⚠️ <b>Эта команда дает доступ к веб-интерфейсу Heroku. Ее выполнение в публичных чатах является угрозой безопасности. Предпочтительно выполнять ее в <a href='tg://openmessage?user_id={}'>Избранных сообщениях</a>. Выполни</b> <code>{}proxypass force_insecure</code> <b>чтобы отключить это предупреждение</b>"\n  privacy_leak_nowarn: "⚠️ <b>Эта команда дает доступ к веб-интерфейсу Heroku. Ее выполнение в публичных чатах является угрозой безопасности. Предпочтительно выполнять ее в <a href='tg://openmessage?user_id={}'>Избранных сообщениях</a>.</b>"\n  opening_tunnel: "🔁 <b>Открываю тоннель к веб-интерфейсу Heroku...</b>"\n  tunnel_opened: "🎉 <b>Тоннель открыт. Эта ссылка будет активна не более 20 минут</b>"\n  tunnel_opened_pass: "🎉 <b>Тоннель открыт. Эта ссылка будет активна не более 20 минут</b>\n\n🔐 <b>Логин:</b> <code>{}</code>\n🔑 <b>Пароль:</b> <code>{}</code>"\n  host_denied: "<tg-emoji emoji-id=6037254263187443802>💬</tg-emoji> Команды добавления сессий не доступны на вашем хостинге, свяжитесь с администрацией вашего хостинга."\n  web_btn: "🌍 Веб-интерфейс"\n  _cmd_doc_weburl: "Открыть тоннель к веб-интерфейсу Heroku"\n  btn_yes: "🚸 Все равно подтвердить"\n  btn_no: "🔻 Закрыть"\n  lavhost_web: "✌️ <b>По этой ссылке ты попадешь в веб-интерфейс Heroku на lavHost</b>\n\n<i>💡 Тебе нужно будет авторизоваться, используя данные, указанные при настройке lavHost</i>"\n  invalid_target: "Ответьте на сообщение человека, которого хотите добавить, или укажите его корректный @username/id."\n  cant_add_self: "Вы не можете добавить самого себя."\n  add_user_confirm: "Вы действительно хотите добавить аккаунт {} ({})?"\n  add_user_insecure: "Вы действительно хотите добавить аккаунт {} ({})? Используйте команду <code>{}addacc {} force_insecure</code> для подтверждения."\n  enter_number: "Ввести номер"\n  your_phone_number: "Ваш номер телефона"\n  enter_code: "Ввести код"\n  login_code: "Ваш код для входа"\n  enter_2fa: "Ввести 2FA пароль"\n  your_2fa: "Ваш пароль двухфакторной аутентификации"\n  incorrect_number: "Вы ввели неверный номер телефона.\n\n"\n  enter_number_format: "Введите свой номер телефона в международном формате (например, +79212345678):"\n  login_successful: "🎉 Успешный вход!"\n  floodwait_error: "Слишком много попыток. Попробуйте снова через {} секунд."\n  code_sent: "Код был отправлен. Введите его"\n  invalid_code: "Невалидный код. Повторите попытку."\n  invalid_password: "Неверный пароль. Повторите попытку."\n  2fa_enabled: "У вас включена двухфакторная аутентификация. Введите пароль."\n  request_code: "🔃 Запросить код снова"\n  code_expired: "Срок действия кода истек."\n\n  switch_confirm: "⚠️ <b>Вы уверены, что хотите перенести юзербота на другой аккаунт?</b>\nТекущая сессия будет завершена."\nYour current session will be closed."\n  switch_insecure: "🚫 <b>Ошибка переноса:</b> инлайн-меню недоступно. Используйте <code>{}switchacc force_insecure</code> для обхода."\n  _cmd_doc_switchacc: "Перенести юзербота на другой Telegram-аккаунт через инлайн"\nheroku_backup:\n  period: "⌚️ <b>Юнит «ALPHA»</b> создает регулярные резервные копии. Эти настройки можно изменить позже.\n\nПожалуйста, выберите периодичность резервного копирования\n\n<b>🚫 Таким образом невозможно восстановить модули скачанные с файлов командой .lm! Будьте осторожны и делайте .backupmods перед восстановлением.</b>"\n  saved: "✅ Периодичность сохранена! Ее можно изменить с помощью <code>{prefix}set_backup_period</code>"\n  saved_bot: "✅ Периодичность сохранена! Ее можно изменить с помощью {prefix}set_backup_period"\n  never: "✅ Я не буду делать автоматические резервные копии. Можно отменить используя <code>{prefix}set_backup_period</code>"\n  never_bot: "✅ Я не буду делать автоматические резервные копии. Можно отменить используя {prefix}set_backup_period"\n  invalid_args: "🚫 <b>Укажи правильную периодичность в часах, или `0` для отключения</b>"\n  backup_caption: '<tg-emoji emoji-id=5469718869536940860>👆</tg-emoji> <b>Это твоя резервная копия базы данных. Не передавай ее никому, она содержит личную информацию. Если тебе нужно ее восстановить, используй</b> <pre><code class="language-heroku">{prefix}restoredb</code></pre> <b>в ответ на этот файл.</b>'\n  backupall_info: '👆 <b>Это твоя резервная копия базы и модулей. Не передавай ее никому, она содержит личную информацию. Если тебе нужно ее восстановить, используй</b> <pre><code class="language-heroku">{prefix}restoreall</code></pre> <b>в ответ на этот файл.</b>'\n  all_restored: "<tg-emoji emoji-id=5774134533590880843>🔄</tg-emoji> <b>Ваша полная резервная копия восстановлена, перезапуск...</b>"\n  all_restored_bot: "🔄 Ваша полная резервная копия восстановлена, перезапуск..."\n  reply_to_file: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Ответь на .json или .zip файл</b>"\n  db_restored: "<tg-emoji emoji-id=5774134533590880843>🔄</tg-emoji> <b>База данных обновлена, перезапуск...</b>"\n  modules_backup: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Бэкап модулей ({})</b>\n\n<b>Вы можете восстановить его используя:</b>\n<pre><code class=\"language-heroku\">{}restoremods</code></pre>"\n  mods_restored: "<tg-emoji emoji-id=5774134533590880843>🔄</tg-emoji> <b>Модули восстановлены, перезапуск</b>"\n  backup_sent: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Резервная копия отправлена в <a href={}>чат с базами данных</a></b>"\n  backupall_sent: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Резервная копия базы и модулей отправлена в <a href={}>чат с базами данных</a></b>"\n  db_warning: "❗️ Обнаружен бекап из Hikka. Если продолжить — юзербот <b>попробует</b> преобразовать его в подходящий формат для Heroku.\nВозможны некоторые ошибки в преобразовании. Продолжить?"\n  advice_converting: "Вы можете вручную заменить <a>'hikka.'</a> на <a>'heroku.'</a> в содержимом бекапа. Это необходимо для его загрузки."\n  converting_db: "🔄 Конвертирую..."\n  probably_zip: "<tg-emoji emoji-id=5210952531676504517>❗️</tg-emoji> <b>Не удалось восстановить бэкап из файла. Вероятно, вы пытаетесь восстановить полный бэкап (.zip или .backup). В этом случае используйте</b> <code>{}restoreall</code> <b>в ответ на файл.</b>"\n  _cls_doc: "Обрабатывает резервные копии базы данных и модулей"\n  _cmd_doc_backupdb: "Создать бэкап базы данных [будет отправлено в лс]"\n  _cmd_doc_backupmods: "Создать бэкап модов [будет отправлено в лс]"\n  _cmd_doc_restoredb: "Восстановить базу данных из файла"\n  _cmd_doc_restoremods: "<ответ на файл> - Восстановить моды из бэкапа"\n  _cmd_doc_set_backup_period: "<время в часах> - Установить частоту бэкапов"\n  _cmd_doc_backupall: "Создаёт общую резервную копию (модули + база)"\n  _cmd_doc_restoreall: "Восстанавливает общую резервную копию (база + модули)"\n\npresets:\n  _fun_title: "🪩 Развлекательные модули"\n  _fun_desc: "Забавные модули — анимации, спам, игры, и др."\n  _chat_title: "👥 Модули администрирования чата"\n  _chat_desc: "Коллекция модулей, которые помогут вам администрировать чат — фильтры, заметки, распознавание речи, и др."\n  _service_title: "⚙️ Полезные модули"\n  _service_desc: "Действительно полезные модули — управление аккаунтом, сократитель ссылок, поисковик, и др."\n  _downloaders_title: "📥 Загрузчики"\n  _downloaders_desc: "Коллекция модулей, которые помогут вам загружать файлы в/из различных(-е) источников(-и) — YouTube, TikTok, Instagram, Spotify, VK Музыка, и др."\n  welcome: "👋 <b>Привет! Устал листать бесчисленное количество модулей в каналах? Могу предложить тебе несколько готовых наборов. Если тебе понадобится повторно вызвать это меню, отправь мне команду /presets</b>"\n  preset: "<b>{}:</b>\nℹ️ <i>{}</i>\n\n⚒ <b>Модули в этом наборе:</b>\n\n{}"\n  back: "🔙 Назад"\n  install: "📦 Установить"\n  installing: "<tg-emoji emoji-id=5451732530048802485>⏳</tg-emoji> <b>Установка набора </b><code>{}</code><b>...</b>"\n  installing_module: "<tg-emoji emoji-id=5451732530048802485>⏳</tg-emoji> <b>Установка набора</b> <code>{}</code> <b>({}/{} модулей)...</b>\n\n<tg-emoji emoji-id=5188377234380954537>🪐</tg-emoji> <i>Установка модуля {}...</i>"\n  installed: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Набор</b> <code>{}</code> <b>установлен!</b>"\n  already_installed: "✅ [Установлен]"\n  add_to_folder_usage: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Укажи папку для добавления модуля. </b> <code>{prefix}addtofolder <папка> <модуль></code>"\n  already_in_folder: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Модуль уже находится в папке</b> <code>{}</code>"\n  added_to_folder: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Модуль {} добавлен в папку</b> <code>{}</code>"\n  module_not_found: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Модуль {} не найден</b>"\n  folder_load_usage: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Укажи папку для загрузки модулей. </b> <code>{prefix}fl <папка></code>"\n  folder_not_found: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Папка {} не найдена</b>"\n  no_modules_in_folder: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>В папке {} нет модулей</b>"\n  folder: "<tg-emoji emoji-id=5256113064821926998>📁</tg-emoji> <b>Папка</b> {}\n\n<tg-emoji emoji-id=5134452506935427991>🪐</tg-emoji> <b>{prefix}lp в ответ на это сообщение для установки</b>"\n  remove_from_folder_usage: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Укажи папку и модуль для удаления. </b> <code>{prefix}removefromfolder <папка> <модуль></code>"\n  removed_from_folder: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Модуль {} удален из папки</b> <code>{}</code>"\n  module_not_in_folder: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Модуль {} не находится в папке {}</b>"\n  _cls_doc: "Предлагает новым пользователям Heroku готовые сборки модулей для загрузки"\n\nsettings:\n  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Выберите вариант установки Heroku:</b>"\n  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> Процесс установки на VDS выполняется одной командой:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Примечание: Если у вас отсутствуют права sudo, исключите соответствующую часть команды.</i>"\n  wsl_install: "<b>Скачай WSL.</b> Для этого открой PowerShell с правами администратора и напиши <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Для установки WSL необходима Windows 10 build 2004 или Windows 11 любой версии и ПК с поддержкой виртуализации. Для установки на более ранние версии ОС обратись к</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">этой странице</a>\n\n⬜️ <b>Перезагрузи ПК и запусти приложение Ubuntu 22.04.x</b> \n\n⬜️ <b>Вставь в него команду (ПКМ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>При появлении желтых предупреждений введи</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>заменив /home/username/.local/bin на тот путь, о котором говорится в сообщении</i>\n\n⬜️ <b>Вставь команду (ПКМ):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Где получить API_ID и API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Видео</a>"\n  userland_install: "<b>Установи UserLAnd по</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">ссылке</a>\n\n<b>Открой его, выбери Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Жди установки дистрибутива, можешь налить чаю</b>\n\n<b>После успешной установки перед тобой откроется терминал, пиши туда:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>В конце установки появится ссылка, переходи по ней и вводи данные своего аккаунта для входа.\n\nВуаля! Вы установили Heroku на UserLAnd.</b>"\n  jamhost_install: "🪐 <b>Установка на 🧃 JamHost:</b>\n\n<b>Перейдите в @jamhostbot, отправьте ему </b><code>/pay</code><b> и следуйте дальнейшим инструкциям.</b>"\n  hikkahost_install: "<b>🌘 Как установить Heroku на HikkaHost?</b>\n\n1. Перейдите в @hikkahost_bot\n2. Выберите «Установить»\n3. Выберите «🪐 Heroku»\n\nИ продолжайте установку.\n\n<b>После этого вы получите ссылку, откройте ее и войдите в свой аккаунт.</b>"\n  lavhost_install: "⬇️ Чтобы установить, просто перейдите в @lavhostbot и выполните следующие шаги:\n\n• Введите команду /buy, выберите и оплатите счет\n• При необходимости отправьте квитанцию об оплате\n• После подтверждения оплаты введите /install и выберите Heroku\n• Следуйте инструкциям бота"\n  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Слишком много аргументов</b>"\n  blacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Чат {} добавлен в черный список юзербота</b>"\n  unblacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Чат {} удален из черного списка юзербота</b>"\n  user_blacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Пользователь {} добавлен в черный список юзербота</b>"\n  user_unblacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Пользователь {} удален из черного списка юзербота</b>"\n  what_prefix: "<tg-emoji emoji-id=5382187118216879236>❓</tg-emoji> <b>А какой префикс ставить то?</b>"\n  prefix_incorrect: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Префикс должен состоять только из одного символа</b>"\n  prefix_set: "{} <b>Префикс команд обновлен. Используй следующую команду, чтобы изменить его обратно:</b>\n<pre><code class=\"language-heroku\">{newprefix}setprefix {oldprefix}</code></pre>"\n  entity_prefix_set: "{} <b>Префикс команды обновлен для {entity_name}. Используйте следующую команду, чтобы вернуть его обратно:</b>\n<pre><code class=\"language-heroku\">{newprefix}setprefix {oldprefix} {entity_id}</code></pre>"\n  id_not_found_scgroup: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> Этот объект не существует ни в одной группе безопасности. Поэтому добавлять для него