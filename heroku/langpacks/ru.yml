witchinfo_off: "<tg-emoji emoji-id=5118861066981344121>✅</tg-emoji> Информация об изображении успешно отключена"\n  desc: "<tg-emoji emoji-id=5188377234380954537>🪐</tg-emoji> <b>Что такое Userbot?</b>\n\n<tg-emoji emoji-id=5472238129849048175>😎</tg-emoji> Userbot - это <b>сторонняя программа</b>, которая взаимодействует с Telegram API для выполнения <b>автоматизированных задач от имени пользователя</b>. Юзерботы могут использоваться для автоматизации различных задач, таких как <b>отправка сообщений, присоединение к каналам, загрузка медиафайлов и многое другое</b>.\n\n<tg-emoji emoji-id=5474667187258006816>😎</tg-emoji> Юзерботы отличаются от обычных ботов в Telegram тем, что <b>они работают на аккаунте пользователя</b>, а не на бот-аккаунте. Это означает, что они могут иметь доступ к большему количеству функций и обладают большей гибкостью в плане выполнения действий.\n\n<tg-emoji emoji-id=5472267631979405211>🚫</tg-emoji> Однако важно отметить, что <b>юзерботы официально не поддерживаются Telegram</b> и их использование может нарушать условия использования платформы. Поэтому <b>пользователи должны быть осторожны при их использовании</b> и убедиться, что на их аккаунте не выполняется вредоносный код.\n\n"\n  no_font: "<tg-emoji emoji-id=5465665476971471368>❌</tg-emoji> Где ссылка или реплай на шрифт?"\n  no_banner: "<tg-emoji emoji-id=6010394680179562842>😶</tg-emoji> <b>По указанной ссылке </b><code>{link}</code><b> ничего не найдено.\n\nПроверьте целостность вашего файла по ссылке, а так же удостоверьтесь, что ссылка указывает прямо на файл.</b>"\n  font_installed: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Шрифт установлен!</b>\n<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <i>Теперь вы с удовольствием можете пользоваться им.</i>"\n  incorrect_format_font: "<tg-emoji emoji-id=5465665476971471368>❌</tg-emoji> <b>Неверный формат шрифта!</b>\n<blockquote>Поддерживаемые форматы -> otf, ttf</blockquote>"\n  incorrect_img_format: "<tg-emoji emoji-id=54