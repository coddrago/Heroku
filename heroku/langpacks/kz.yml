  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> VDS-ке орнату процесі бір пәрменмен орындалады:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Ескертпе: Егер sudo құқықтарыңыз болмаса, пәрменнің сәйкес бөлігін өткізіп жіберіңіз.</i>"
  wsl_install: "<b>WSL жүктеп алыңыз.</b> Ол үшін PowerShell-ді әкімші ретінде ашып, <code>wsl --install -d Ubuntu-22.04</code> деп теріңіз \n⚠️ <i>WSL орнату үшін Windows 10 build 2004 немесе Windows 11-дің кез келген нұсқасы және виртуалдандыруды қолдайтын ДК қажет. Ескірек ОЖ нұсқаларына орнату үшін</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">осы бетке</a> <i>жүгініңіз</i>\n\n⬜️ <b>ДК-ді қайта іске қосып, Ubuntu 22.04.x қосымшасын іске қосыңыз</b> \n\n⬜️ <b>Оған пәрменді қойыңыз (Оң жақ батырма):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>Егер сары ескертулер пайда болса,</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>деп теріп, /home/username/.local/bin бөлігін хабарламада көрсетілген жолмен алмастырыңыз</i>\n\n⬜️ <b>Пәрменді қойыңыз (Оң жақ батырма):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>API_ID және API_HASH қайдан алуға болады?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Видео</a>"
  userland_install: "<b>UserLAnd-ты осы</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">сілтеме</a> <b>арқылы орнатыңыз</b>\n\n<b>Оны ашып, Ubuntu —&gt; Minimal —&gt; Terminal таңдаңыз</b>\n\n<b>Дистрибутив орнатылғанша күтіңіз, шай ішіп алуға болады</b>\n\n<b>Сәтті орнатылғаннан кейін алдыңызда терминал ашылады, сол жерге жазыңыз:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>Орнату соңында сілтеме пайда болады, оған өтіп, кіру үшін аккаунт деректерін енгізіңіз.\n\nМіне! Сіз UserLAnd-та Heroku орнаттыңыз.</b>"
  jamhost_install: "🪐 <b>🧃 JamHost-қа орнату:</b>\n\n<b>@jamhostbot-қа өтіп, </b><code>/pay</code><b> деп жазыңыз және оның нұсқауларын орындаңыз.</b>"
  hikkahost_install: "<b>🌘 Heroku-ды HikkaHost-қа қалай орнатуға болады?</b>\n\n1. @hikkahost_bot-қа өтіңіз\n2. \"Install\" таңдаңыз\n3. \"🪐 Heroku\" таңдаңыз\n\nЖәне орнатуды жалғастырыңыз.\n\n<b>Содан кейін сіз сілтеме аласыз, оны ашып, аккаунтыңызға кіріңіз.</b>"
  lavhost_install: "⬇️ Орнату үшін жай ғана @lavhostbot-қа өтіп, мына қадамдарды орындаңыз:\n\n• /buy пәрменін енгізіңіз, шотты таңдап, төлеңіз\n• Қажет болса, төлем түбіртегін жіберіңіз\n• Төлем расталғаннан кейін /install енгізіп, Heroku таңдаңыз\n• Боттың нұсқауларын орындаңыз"
  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Аргументтер тым көп</b>"
  blacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Чат {} юзерботтың қара тізіміне енгізілді</b>"
  unblacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Чат {} юзерботтың қара тізімінен шығарылды</b>"
  user_blacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Пайдаланушы {} юзерботтың қара тізіміне енгізілді</b>"
  user_unblacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Пайдаланушы {} юзерботтың қара тізімінен шығарылды</b>"
  what_prefix: "<tg-emoji emoji-id=5382187118216879236>❓</tg-emoji> <b>Префикс қандай болуы керек?</b>"
  prefix_incorrect: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Префикс ұзындығы бір таңба болуы керек</b>"
  prefix_set: "{} <b>Пәрмен префиксі жаңартылды. Оны қайтару үшін келесі пәрменді қолданыңыз:</b>\n<pre><code class=\"language-heroku\">{newprefix}setprefix {oldprefix}</code></pre>"
