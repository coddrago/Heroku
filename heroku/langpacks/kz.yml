quickstart:
  name: "Quickstart"
  base: "🪐 <b>Сәлем.</b> Сіздің <b>Heroku</b> юзерботыңыз енді орнатылды.\n\n❓ <b>Көмек керек пе?</b> <a href=\"https://t.me/heroku_talks\">Біздің қолдау чатымызға</a> қосылыңыз. Біз <b>барлығына</b> көмектесеміз.\n\n💁‍♀️ <b>Жылдам нұсқаулық:</b>\n\n1️⃣ Модульдер тізімін көру үшін <code>.help</code> <b>деп жазыңыз</b>\n2️⃣ Модуль сипаттамасын көру үшін <code>.help &lt;Модуль аты/пәрмен&gt;</code> <b>деп жазыңыз</b>\n3️⃣ Сілтемеден модуль жүктеу үшін <code>.dlmod &lt;сілтеме&gt;</code> <b>деп жазыңыз</b>\n4️⃣ Файлдан модуль жүктеу үшін файлға жауап ретінде <code>.loadmod</code> <b>деп жазыңыз</b>\n5️⃣ Модульді жүктеуден алу үшін <code>.unloadmod &lt;Модуль аты&gt;</code> <b>деп жазыңыз</b>\n\n💡 <b>Heroku Hikka, Friendly-Telegram және GeekTG модульдерін, сондай-ақ өз модульдерін қолдайды.</b>\n"
  lavhost: "✌️ <b>Юзерботыңыз lavHost-та орнатылған</b>. Маңызды хабарландырулар мен жаңартулар үшін @lavhost-қа қосылғаныңызға көз жеткізіңіз. Платформаға қатысты барлық сұрақтарды @lavhostchat-та қою керек."
  language_saved: "🇰🇿 Тіл сақталды!"
  language: "🇰🇿 Қазақша"
