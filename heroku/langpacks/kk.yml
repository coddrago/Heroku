  prefix_set: "{} <b>Команда префиксі жаңартылды. Қайтару үшін мына команданы пайдаланыңыз:</b>\n<pre><code class=\"language-heroku\">{newprefix}setprefix {oldprefix}</code></pre>"
  entity_prefix_set: "{} <b>{entity_name} үшін команда префиксі жаңартылды. Қайтару үшін мына команданы пайдаланыңыз:</b>\n<pre><code class=\"language-heroku\">{newprefix}setprefix {oldprefix} {entity_id}</code></pre>"
