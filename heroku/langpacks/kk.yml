  _cfg_banner: "Баннер суретіне URL"
  desc: "<emoji document_id=5188377234380954537>🪐</emoji> <b>Userbot — бұл не?</b>\n\n<emoji document_id=5472238129849048175>😎</emoji> Userbot — Telegram API-мен өзара әрекеттесетін <b>үшінші тарап бағдарламасы</b>, ол <b>пайдаланушы атынан автоматтандырылған тапсырмаларды</b> орындайды. Userbot-тар хабарлама жіберу, арналарға қосылу, медиа жүктеу және т.б. сияқты әртүрлі тапсырмаларды автоматтандыруға қолданылады.\n\n<emoji document_id=5474667187258006816>😎</emoji> Userbot-тар қарапайым Telegram боттарынан <b>пайдаланушы аккаунтында</b> жұмыс істейтінімен ерекшеленеді. Бұл userbot-тарға көбірек мүмкіндіктерге қолжетімділік және орындай алатын әрекеттерде үлкен икемділік береді.\n\n<emoji document_id=5472267631979405211>🚫</emoji> Алайда, userbot-тар Telegram-дың ресми қолдауына ие емес және оларды пайдалану платформаның қызмет көрсету шарттарын бұзуы мүмкін екенін ескеру маңызды. Сондықтан <b>пайдаланушылар userbot-тарды абайлап пайдалануы</b> және олардың зиянды мақсаттарда қолданылмауына көз жеткізуі керек.\n\n"
  no_font: "<emoji document_id=5465665476971471368>❌</emoji> Сілтеме немесе жауаптағы қаріп қайда?"  
  no_banner: "<emoji document_id=6010394680179562842>😶</emoji> <b>Көрсетілген сілтемеде ештеңе табылмады </b><code>{link}</code><b>.\n\nФайлдың тұтастығын тексеріңіз және сілтеме тікелей файлға нұсқайтынына көз жеткізіңіз.</b>"
  font_installed: "<emoji document_id=5436040291507247633>🎉</emoji> <b>Қаріп сәтті орнатылды!</b>\n<emoji document_id=5436040291507247633>🎉</emoji> <i>Енді оны пайдалана аласыз.</i>"  
