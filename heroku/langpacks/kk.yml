quickstart:
  name: "Quickstart"
  base: "🪐 <b>Сәлем.</b> Сіздің <b>Heroku</b> userbot-ыңыз енді орнатылды.\n\n❓ <b>Көмек керек пе?</b> <a href=\"https://t.me/heroku_talks\">Біздің қолдау чатына</a> қосылыңыз. Біз <b>барлығына</b> көмектесеміз.\n\n💁‍♀️ <b>Қысқаша нұсқаулық:</b>\n\n1️⃣ <b>.help</b> жазыңыз <b>модульдер тізімін көру үшін</b>\n2️⃣ <b>.help &lt;Модуль атауы/команда&gt;</b> жазыңыз <b>модуль сипаттамасын көру үшін</b>\n3️⃣ <b>.dlmod &lt;сілтеме&gt;</b> жазыңыз <b>сілтемеден модуль жүктеу үшін</b>\n4️⃣ <b>.loadmod</b> файлға жауап ретінде жазыңыз <b>файлдан модуль жүктеу үшін</b>\n5️⃣ <b>.unloadmod &lt;Модуль атауы&gt;</b> жазыңыз <b>модульді жүктеуден шығару үшін</b>\n\n💡 <b>Heroku Hikka, Friendly-Telegram, GeekTG модульдерін және өз модульдерін қолдайды.</b>\n"
  lavhost: "✌️ <b>Userbot lavHost-та орнатылды</b>. Маңызды хабарландырулар мен жаңартулар үшін @lavhost-қа жазылыңыз. Платформаға қатысты барлық сұрақтарды @lavhostchat-та қойыңыз."
  language_saved: "🇰🇿 Тіл сақталды!"
