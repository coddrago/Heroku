  choose_installation: "<emoji document_id=5363805650327450240>🪐</emoji> <b>Heroku орнату нұсқаңызды таңдаңыз:</b>"
  vds_install: "<emoji document_id=5471952986970267163>💎</emoji> VDS-те орнату бір командамен жүзеге асырылады:\n<pre><code class=\"language-shell\">sudo apt update && sudo apt upgrade -y && sudo apt install git python3-pip && git clone https://github.com/coddrago/Heroku && cd Heroku && pip install -r requirements.txt && python3 -m heroku</code></pre>\n<i>Ескертпе: sudo рұқсатыңыз болмаса, командадағы тиісті бөлікті алып тастаңыз.</i>"
  wsl_install: "<b>WSL жүктеп алыңыз.</b> Ол үшін әкімші ретінде PowerShell ашып, <code>wsl --install -d Ubuntu-22.04</code> теріңіз \n⚠️ <i>WSL орнату үшін Windows 10 build 2004 немесе Windows 11 кез келген нұсқасы және виртуализацияны қолдайтын компьютер қажет. Ертерек нұсқаларда орнату үшін</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">осы бетке</a> жүгініңіз\n\n⬜️ <b>Компьютерді қайта қосып, Ubuntu 22.04.x қолданбасын іске қосыңыз</b> \n\n⬜️ <b>Оған команда көшіріңіз (ОЖ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>Сары ескертулер шықса,</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>теріңіз, хабарламадағы жолды ауыстырыңыз</i>\n\n⬜️ <b>Команданы көшіріңіз (ОЖ):</b> \n<pre><code class=\"language-bash\">clear && git clone https://github.com/coddrago/Heroku && cd Heroku && pip install -r requirements.txt && python3 -m heroku</code></pre>\n🔗 <b>API_ID және API_HASH қайдан алуға болады?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Видео</a>"
  userland_install: "<b>UserLAnd-ты осы</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">сілтемеден</a> орнатыңыз\n\n<b>Оны ашып, Ubuntu → Minimal → Terminal таңдаңыз</b>\n\n<b>Дистрибутив орнатылғанша күтіңіз, шай құйыңыз</b>\n\n<b>Сәтті орнатудан кейін терминал ашылады, оған теріңіз:</b>\n<pre><code class=\"language-bash\">sudo apt update && sudo apt upgrade -y && sudo apt install python3 git python3-pip -y && git clone https://github.com/coddrago/Heroku && cd Heroku && sudo pip install -r requirements.txt && python3 -m heroku</code></pre>\n\n<b>Орнату соңында сілтеме шығады, оны ашып, аккаунт деректерін енгізіңіз.\n\nМіне! UserLAnd-та Heroku орнаттыңыз.</b>"
  jamhost_install: "🪐 <b>🧃 JamHost-та орнату:</b>\n\n<b>@jamhostbot-қа өтіп, </b><code>/pay</code><b> теріңіз және нұсқауларды орындаңыз.</b>"
  hikkahost_install: "<b>🌘 Heroku-ны HikkaHost-та қалай орнатуға болады?</b>\n\n1. @hikkahost_bot-қа өтіңіз\n2. \"Орнату\" таңдаңыз\n3. \"🪐 Heroku\" таңдаңыз\n\nЖәне орнатуды жалғастырыңыз.\n\n<b>Содан кейін сілтеме аласыз, оны ашып, аккаунтыңызға кіріңіз.</b>"
  lavhost_install: "⬇️ Орнату үшін @lavhostbot-қа өтіп, мына қадамдарды орындаңыз:\n\n• /buy командасын енгізіп, шотты таңдап төлеңіз\n• Қажет болса, төлем түбіртегін жіберіңіз\n• Төлем расталған соң /install енгізіп, Heroku таңдаңыз\n• Бот нұсқауларын орындаңыз"
  too_many_args: "<emoji document_id=5210952531676504517>🚫</emoji> <b>Аргументтер тым көп</b>"
  blacklisted: "<emoji document_id=5197474765387864959>👍</emoji> <b>{} чаты userbot-тан қара тізімге енгізілді</b>"
  unblacklisted: "<emoji document_id=5197474765387864959>👍</emoji> <b>{} чаты userbot-тан қара тізімнен шығарылды</b>"
  user_blacklisted: "<emoji document_id=5197474765387864959>👍</emoji> <b>{} пайдаланушысы userbot-тан қара тізімге енгізілді</b>"
  user_unblacklisted: "<emoji document_id=5197474765387864959>👍</emoji> <b>{} пайдаланушысы userbot-тан қара тізімнен шығарылды</b>"
  what_prefix: "<emoji document_id=5382187118216879236>❓</emoji> <b>Префикс қандай болуы керек?</b>"
