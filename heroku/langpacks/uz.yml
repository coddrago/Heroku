  modules_backup: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Modullar zahira nusxasi ({})</b>\n\n<b>Siz uni quyidagi orqali tiklashingiz mumkin:</b>\n<pre><code class=\"language-heroku\">{}restoremods</code></pre>"
