  _cfg_cst_btn: "Ma'lumot uchun maxsus tugma. Tugmani olib tashlash uchun bo‘sh qoldiring"
  _cfg_banner: "Rasm banneriga URL"
  desc: "<tg-emoji emoji-id=5188377234380954537>🪐</tg-emoji> <b>Yuzerbot — bu nima?</b>\n\n<tg-emoji emoji-id=5472238129849048175>😎</tg-emoji> Yuzerbot bu Telegram API bilan o‘zaro aloqada bo‘lib, <b>foydalanuvchi nomidan avtomatlashtirilgan vazifalarni</b> bajaradigan <b>uchinchi tomon dasturi</b> hisoblanadi. Ushbu yuzerbotlar <b>xabarlar yuborish, kanallarga qo‘shilish, media yuklab olish va boshqa ko‘plab vazifalarni</b> avtomatlashtirish uchun ishlatilishi mumkin.\n\n<tg-emoji emoji-id=5474667187258006816>😎</tg-emoji> Yuzerbotlar oddiy Telegram botlaridan farq qiladi, chunki <b>ular bot hisobida emas, balki foydalanuvchi hisobida ishlaydi</b>. Bu degani, yuzerbotlar ko‘proq funksiyalarga kirish huquqiga ega va bajarishi mumkin bo‘lgan harakatlar bo‘yicha katta moslashuvchanlikka ega.\n\n<tg-emoji emoji-id=5472267631979405211>🚫</tg-emoji> Biroq, shuni ta'kidlash kerakki, <b>yuzerbotlar Telegram tomonidan rasman qo‘llab-quvvatlanmaydi</b> va ulardan foydalanish platformaning xizmat ko‘rsatish shartlarini buzishi mumkin. Shunday qilib, <b>foydalanuvchilar yuzerbotlardan foydalanishda ehtiyot bo‘lishlari</b> va ular zararli maqsadlarda ishlatilmasligiga ishonch hosil qilishlari kerak.\n\n"
  no_font: "<tg-emoji emoji-id=5465665476971471368>❌</tg-emoji> Shriftga havola yoki javob qani?"  
  no_banner: "<tg-emoji emoji-id=6010394680179562842>😶</tg-emoji> <b>Ko‘rsatilgan havolada hech narsa topilmadi </b><code>{link></code><b>.\n\nFaylingizning yaxlitligini havola orqali tekshiring va havola to‘g‘ridan-to‘g‘ri faylga ishora qilayotganiga ishonch hosil qiling.</b>"
  font_installed: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Shrift muvaffaqiyatli o‘rnatildi!</b>\n<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <i>Endi undan foydalanishingiz mumkin.</i>"  
  incorrect_format_font: "<tg-emoji emoji-id=5465665476971471368>❌</tg-emoji> <b>Noto‘g‘ri shrift formati!</b>\n<blockquote>Qo‘llab-quvvatlanadigan formatlar -> otf, ttf</blockquote>"  
