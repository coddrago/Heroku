  _cfg_cst_msg: "Ma'lumot uchun maxsus xabar. {me}, {version}, {build}, {prefix}, {platform}, {upd}, {uptime}, {cpu_usage}, {ram_usage}, {branch}, {hostname}, {user}, {os}, {kernel}, {cpu}, {ping}, {python_ver}, {htl_ver}, {git_status} kalit so‘zlarini o‘z ichiga olishi mumkin"
