settings:
  name: "Settings"
  vds: "💎 VDS"
  wsl: "💻 WSL"
  userland: "🐧 UserLand"
  jamhost: "🧃 JamHost"
  hikkahost: "🌼 HikkaHost"
  lavhost: "✌️ lavHost"
  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Heroku o‘rnatish variantini tanlang:</b>"
  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> VDS-ga o‘rnatish jarayoni bitta buyruq bilan amalga oshiriladi:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Eslatma: Agar sudo huquqlariga ega bo‘lmasangiz, buyruqning tegishli qismini o‘tkazib yuboring.</i>"
  wsl_install: "<b>WSL-ni yuklab oling.</b> Buning uchun PowerShell-ni administrator sifatida oching va <code>wsl --install -d Ubuntu-22.04</code> deb yozing \n⚠️ <i>WSL-ni o‘rnatish uchun Windows 10 build 2004 yoki Windows 11 ning istalgan versiyasi va virtualizatsiyani qo‘llab-quvvatlaydigan shaxsiy kompyuter kerak. OT-ning oldingi versiyalariga o‘rnatish uchun</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">ushbu sahifaga</a> <i>murojaat qiling</i>\n\n⬜️ <b>Kompyuteringizni qayta ishga tushiring va Ubuntu 22.04.x ilovasini ishga tushiring</b> \n\n⬜️ <b>Unga buyruqni joylang (O'ng tugma):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>Agar sariq ogohlantirishlar paydo bo‘lsa,</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>deb yozing, /home/username/.local/bin ni xabarda ko‘rsatilgan yo‘l bilan almashtiring</i>\n\n⬜️ <b>Buyruqni joylang (O'ng tugma):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>API_ID va API_HASH qayerdan olinadi?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Video</a>"
  userland_install: "<b>UserLAnd-ni ushbu</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">havola</a> <b>orqali o‘rnating</b>\n\n<b>Uni oching, Ubuntu —&gt; Minimal —&gt; Terminal-ni tanlang</b>\n\n<b>Distributiv o‘rnatilishini kuting, choy ichib olishingiz mumkin</b>\n\n<b>Muvaffaqiyatli o‘rnatilgandan so‘ng, oldingizda terminal ochiladi, u yerga yozing:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>O‘rnatish oxirida havola paydo bo‘ladi, unga o‘ting va kirish uchun hisob ma'lumotlaringizni kiriting.\n\nVoilà! Siz UserLAnd-da Heroku-ni o‘rnatdingiz.</b>"
  jamhost_install: "🪐 <b>🧃 JamHost-ga o‘rnatish:</b>\n\n<b>@jamhostbot ga o‘ting, </b><code>/pay</code><b> deb yozing va uning ko‘rsatmalariga amal qiling.</b>"
  hikkahost_install: "<b>🌘 Heroku-ni HikkaHost-ga qanday o‘rnatish mumkin?</b>\n\n1. @hikkahost_bot ga o‘ting\n2. \"Install\" ni tanlang\n3. \"🪐 Heroku\" ni tanlang\n\nVa o‘rnatishni davom ettiring.\n\n<b>Shundan so‘ng siz havola olasiz, uni oching va hisobingizga kiring.</b>"
  lavhost_install: "⬇️ O‘rnatish uchun shunchaki @lavhostbot ga o‘ting va ushbu qadamlarni bajaring:\n\n• /buy buyrug‘ini kiriting, hisobni tanlang va to‘lang\n• Agar kerak bo‘lsa, to‘lov kvitansiyasini yuboring\n• To‘lov tasdiqlangandan so‘ng, /install ni kiriting va Heroku-ni tanlang\n• Bot ko‘rsatmalariga amal qiling"
  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Argumentlar juda ko‘p</b>"
  blacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Chat {} yuzerbotdan qora ro‘yxatga kiritildi</b>"
