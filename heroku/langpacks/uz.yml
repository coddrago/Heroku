  prefix_set: "{} <b>Buyruq prefiksi yangilandi. Uni qaytarish uchun quyidagi buyruqdan foydalaning:</b>\n<pre><code class=\"language-heroku\">{newprefix}setprefix {oldprefix}</code></pre>"
