  db_warning: "❗️ Hikka zahira nusxasi aniqlandi. Agar davom ettirsangiz, yuzerbot uni Heroku uchun mos formatga o‘tkazishga <b>harakat</b> qiladi.\nKonversiyada ba'zi xatolar bo‘lishi mumkin. Davom ettirasizmi?"
