мкнена"\n  desc: "<tg-emoji emoji-id=5188377234380954537>🪐</tg-emoji> <b>Що таке Userbot?</b>\n\n<tg-emoji emoji-id=5472238129849048175>😎</tg-emoji> Userbot - це <b>стороння програма</b>, яка взаємодіє з Telegram API для виконання <b>автоматизованих завдань від імені користувача</b>. Юзерботи можуть використовуватися для автоматизації різних завдань, таких як <b>надсилання повідомлень, приєднання до каналів, завантаження медіафайлів і багато іншого</b>.\n\n<tg-emoji emoji-id=5474667187258006816>😎</tg-emoji> Юзерботи відрізняються від звичайних ботів у Telegram тим, що <b>вони працюють на акаунті користувача</b>, а не на бот-акаунті. Це означає, що вони можуть мати доступ до більшої кількості функцій і мають більшу гнучкість у плані виконання дій.\n\n<tg-emoji emoji-id=5472267631979405211>🚫</tg-emoji> Однак важливо зазначити, що <b>юзерботи офіційно не підтримуються Telegram</b> і їх використання може порушувати умови використання платформи. Тому <b>користувачі мають бути обережними під час їх використання</b> і переконатися, що на їхньому акаунті не виконується шкідливий код.\n\n"\n  no_font: "<tg-emoji emoji-id=5465665476971471368>❌</tg-emoji> Де посилання чи відповідь з шрифтом?"\n  no_banner: "<tg-emoji emoji-id=6010394680179562842>😶</tg-emoji> <b>За вказаним посиланням </b><code>{link}</code><b> нічого не знайдено.\n\nПеревірте цілісність вашого файлу за посиланням, а також переконайтеся, що посилання вказує безпосередньо на файл.</b>"\n  font_installed: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Шрифт успішно встановлено!</b>\n<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <i>Тепер ви можете ним користуватися.</i>"\n  incorrect_format_font: "<tg-emoji emoji-id=5465665476971471368>❌</tg-emoji> <b>Невірний формат шрифту!</b>\n<blockquote>Підтримувані формати → otf, ttf</blockquote>"\n  incorrect_img_format: "<tg-emoji emoji-id=5465665476971471368>❌</tg-emoji> <b>Невірний формат зображення</b>\n<blockquote>Підтримувані формати → jpg, jpeg, png, bmp, webp</blockquote>"\n  _cmd_doc_ubinfo: "Надіслати інформацію на кшталт 'Що таке Хероку?'"\n  _cmd_doc_info: "Надсилає інформацію про бота"\n  _cmd_doc_setinfo: "<текст> - Змінити текст у .info"\n\nloader:\n  link: "<tg-emoji emoji-id=5256113064821926998>📁</tg-emoji> <b>Файл</b> {class_name}\n\n<tg-emoji emoji-id=5134452506935427991>🪐</tg-emoji> <b>{prefix}lm у відповідь на це повідомлення до установити</b>\n\n<tg-emoji emoji-id=4916086774649848789>🔗</tg-emoji> <code>{prefix}dlm {url}</code>\n\n{not_exact}"\n  file: "<tg-emoji emoji-id=5256113064821926998>📁</tg-emoji> <b>Файл</b> {class_name}\n\n<tg-emoji emoji-id=5134452506935427991>🪐</tg-emoji> <b>{prefix}lm у відповідь до цього повідомлення встановити</b>\n\n{not_exact}"\n  finding_module_in_repos: "<tg-emoji emoji-id=5873204392429096339>🔄</tg-emoji> Пошук модулів у сховищах."\n  loading_module_via_file: "<tg-emoji emoji-id=5873204392429096339>🔄</tg-emoji> Завантаження модуля."\n  ml_load_module: "<tg-emoji emoji-id=5873204392429096339>🔄</tg-emoji> Я завантажую модуль як файл."\n  not_exact: "<tg-emoji emoji-id=5355133243773435190>⚠️</tg-emoji> <i>Точного збігу не знайдено, тому замість нього показано найближчий результат</i>"\n  repo_config_doc: "Посилання для завантаження модулів"\n  add_repo_config_doc: "Додаткові репозиторії"\n  avail_header: "<tg-emoji emoji-id=5440551785284510215>🎢</tg-emoji> <b>Офіційні модулі з репозиторію</b>"\n  no_module: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Модуль недоступний у репозиторії.</b>"\n  no_file: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Файл не знайдено</b>"\n  provide_module: "<tg-emoji emoji-id=5312383351217201533>⚠️</tg-emoji> <b>Вкажи модуль для завантаження</b>"\n  bad_unicode: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Неправильне кодування модуля</b>"\n  load_failed: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Завантаження не увінчалося успіхом. Дивись логи.</b>"\n  loaded: "<tg-emoji emoji-id=513445250693