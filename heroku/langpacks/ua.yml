emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Відповісти за допомогою файлу .json або .zip</b>"\n  db_restored: "<tg-emoji emoji-id=5774134533590880843>🔄</tg-emoji> <b>База даних оновлена, перезапуск...</b>"\n  modules_backup: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Резервна копія модулів ({})</b>\n\n<b>Ви можете відновити її за допомогою:</b>\n<pre><code class=\"language-heroku\">{}restoremods</code></pre>"\n  mods_restored: "<tg-emoji emoji-id=5774134533590880843>🔄</tg-emoji> <b>Модулі відновлено, перезапуск</b>"\n  backup_sent: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Резервну копію надіслано до <a href={}>чату з базами даних</a></b>"\n  backupall_sent: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Резервна копія бази та модулів надіслана в <a href={}>чат з базами даних</a></b>"\n  db_warning: "❗️ Виявлено резервну копію Hikka. Якщо ви продовжите, користувач-бот <b>спробує</b> конвертувати її у формат, придатний для Heroku.\nПід час конвертації можуть бути деякі помилки. Продовжити?"\n  advice_converting: "Ви можете вручну замінити <a>'hikka.'</a> на <a>'heroku.'</a> у вмісті резервної копії. Це необхідно для її завантаження."\n  converting_db: "🔄 Конвертування..."\n  probably_zip: "<tg-emoji emoji-id=5210952531676504517>❗️</tg-emoji> <b>Не вдалося відновити бекап з файлу. Ймовірно, ви намагаєтеся відновити повний бекап (.zip або .backup). У цьому випадку використовуйте</b> <code>{}restoreall</code> <b>у відповідь на файл.</b>"\n  _cls_doc: "Обробляє резервні копії бази даних і модулів"\n  _cmd_doc_backupdb: "Створити резервну копію бази даних [буде надіслано на PM]"\n  _cmd_doc_backupmods: "Створити резервну копію модів [буде надіслано в личку]"\n  _cmd_doc_restoredb: "Відновити базу даних із файлу"\n  _cmd_doc_restoremods: "<відповідь на файл> - відновити моди з резервної копії"\n  _cmd_doc_set_backup_period: "<час у годинах> - Установіть частоту резервного копіювання"\n  _cmd_doc_backupall: "Створює загальну резервну копію (модулі + база)"\n  _cmd_doc_restoreall: "Відновлює загальну резервну копію (база + модулі)"\n\npresets:\n  _fun_title: "🪩 Розважальні модулі"\n  _fun_desc: "Кумедні модулі — анімації, спам, ігри, та ін."\n  _chat_title: "👥 Модулі адміністрування чату"\n  _chat_desc: "Колекція модулів, які допоможуть вам адмініструвати чат — фільтри, нотатки, розпізнавання мовлення, та ін."\n  _service_title: "⚙️ Корисні модулі"\n  _service_desc: "Дійсно корисні модулі — керування акаунтом, скорочувач посилань, пошукач, та ін."\n  _downloaders_title: "📥 Завантажувачі"\n  _downloaders_desc: "Колекція модулів, які допоможуть вам завантатжувати файли в/з різних(-і) джерел(-а) — YouTube, TikTok, Instagram, Spotify, VK Музика, та ін."\n  welcome: "👋 <b>Привіт! Втомився гортати безкінечну кількість модулів в каналах? Можу запропонувати тобі декілька готових наборів. Якщо тобі знадобится знову викликати це меню, надішли мені команду /presets</b>"\n  preset: "<b>{}:</b>\nℹ️ <i>{}</i>\n\n⚒ <b>Модулі в цьому наборі:</b>\n\n{}"\n  back: "🔙 Назад"\n  install: "📦 Встановити"\n  installing: "<tg-emoji emoji-id=5451732530048802485>⏳</tg-emoji> <b>Встановлення набору </b><code>{}</code><b>...</b>"\n  installing_module: "<tg-emoji emoji-id=5451732530048802485>⏳</tg-emoji> <b>Встановлення набору</b> <code>{}</code> <b>({}/{} модулів)...</b>\n\n<tg-emoji emoji-id=5188377234380954537>🪐</tg-emoji> <i>Встановлення модуля {}...</i>"\n  installed: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Набір</b> <code>{}</code> <b>встановлено!</b>"\n  already_installed: "✅ [Встановлено]"\n  add_to_folder_usage: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Вкажи папку для додавання модуля. </b> <code>{prefix}addtofolder <папка> <модуль></code>"\n  already_in_folder: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Модуль вже знаходиться в папці</b> <code>{}</code>"\n  added_to_folder: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Модуль {} додано до папки</b> <code>{}</code>"\n  module_not_found: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Модуль {} не знайдено</b>"\n  folder_load_usage: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Вкажи папку для завантаження модулів. </b> <code>{prefix}fl <папка></code>"\n  folder_not_found: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Папка {} не знайдена</b>"\n  no_modules_in_folder: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>У папці {} немає модулів</b>"\n  folder: "<tg-emoji emoji-id=5256113064821926998>📁</tg-emoji> <b>Папка</b> {}\n\n<tg-emoji emoji-id=5134452506935427991>🪐</tg-emoji> <b>Відповідь на це повідомлення {prefix}lp для встановлення</b>"\n  remove_from_folder_usage: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Вкажи папку та модуль для видалення. </b> <code>{prefix}removefromfolder <папка> <модуль></code>"\n  removed_from_folder: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Модуль {} видалено з папки</b> <code>{}</code>"\n  module_not_in_folder: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Модуль {} не знаходиться в папці {}</b>"\n  _cls_doc: "Пропонує новим користувачам Heroku пакети модулів для завантаження"\n\nsettings:\n  choose_installation: "<tg-emoji emoji-id=5363805650327450240>🪐</tg-emoji> <b>Виберіть варіант установки Heroku:</b>"\n  vds_install: "<tg-emoji emoji-id=5471952986970267163>💎</tg-emoji> Процес установки на VDS виконується однією командою:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Примітка: Якщо у вас відсутні права sudo, виключіть відповідну частину команди.</i>"\n  wsl_install: "<b>Завантаж WSL.</b> Для цього відкрий PowerShell з правами адміністратора і напиши <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Для встановлення WSL потрібна Windows 10 збірки 2004 або Windows 11 будь-якої версії та ПК з підтримкою віртуалізації. Для встановлення на більш ранні версії ОС звернись до</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">цієї сторінки</a>\n\n⬜️ <b>Перезавантаж ПК та запусти додаток Ubuntu 22.04.x</b> \n\n⬜️ <b>Встав у нього команду (ПКМ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>При появі жовтих попереджень введи</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>замінивши /home/username/.local/bin на той шлях, про який йдеться в повідомленні</i>\n\n⬜️ <b>Встав команду (ПКМ):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Де отримати API_ID та API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Відео</a>"\n  userland_install: "<b>Встанови UserLAnd за</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">посиланням</a>\n\n<b>Відкрий його, вибери Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Чекай встановлення дистрибутиву, можеш налити чаю</b>\n\n<b>Після успішного встановлення перед тобою відкриється термінал, пиши туди:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>В кінці встановлення з'явиться посилання, переходи за ним і вводи дані свого акаунта для входу.\n\nВуаля! Ви встановили Heroku на UserLAnd.</b>"\n  jamhost_install: "🪐 <b>Встановлення на 🧃 JamHost:</b>\n\n<b>Перейдіть до @jamhostbot, надішліть йому </b><code>/pay</code><b> і дотримуйтесь подальших інструкцій.</b>"\n  hikkahost_install: "<b>🌘 Як встановити Heroku на HikkaHost?</b>\n\n1. Перейдіть до @hikkahost_bot\n2. Виберіть \"Установить\"\n3. Виберіть \"🪐 Heroku\"\n\nІ продовжуйте встановлення.\n\n<b>Після цього ви отримаєте посилання, відкрийте його та увійдіть у свій акаунт.</b>"\n  lavhost_install: "⬇️ Щоб встановити, просто перейдіть до @lavhostbot і виконайте наступні кроки:\n\n• Введіть команду /buy, виберіть і оплатіть рахунок\n• За необхідності надішліть квитанцію про оплату\n• Після підтвердження оплати введіть /install і виберіть Heroku\n• Дотримуйтесь інструкцій бота"\n  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <bЗанадто багато аргументів</b>"\n  blacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Чат {} додано до чорного списку юзербота</b>"\n  unblacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Чат {} видалено з чорного списку юзербота</b>"\n  user_blacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Користувача {} додано до чорного списку юзербота</b>"\n  user_unblacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Користувача {} видалено з чорного списку юзербота</b>"\n  what_prefix: "<tg-emoji emoji-id=5382187118216879236>❓</tg-emoji> <b>А який префікс встановлювати?</b>"\n  prefix_incorrect: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Префікс має бути тільки з одного символу</b>"\n  prefix_set: "{} <b>Префікс команд оновлено. Використай наступну команду, щоб змінити його назад:</b>\n<pre><code class=\"language-heroku\">{newprefix}setprefix {oldprefix}</code></pre>"\n  entity_prefix_set: "{} <b>Префікс команди оновлено для {entity_name}. Використайте наступну команду, щоб змінити його назад:</b>\n<pre><code class=\"language-heroku\">{newprefix}setprefix {oldprefix} {entity_id}</code></pre>"\n  id_not_found_scgroup: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> Ця сутність не існує в жодній групі безпеки. Тому додавати для неї префікс безглуздо"\n  invalid_id_or_username: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-em