паю туннель к вебу...</b>"\n  tunnel_opened: "🎉 <b>Туннель прокопан. Ссылка живет 20 минут, успевай</b>"\n  tunnel_opened_pass: "🎉 <b>Туннель прокопан. Ссылка живет 20 минут, успевай</b>\n\n🔐 <b>Логин:</b> <code>{}</code>\n🔑 <b>Пароль:</b> <code>{}</code>"\n  host_denied: "<tg-emoji emoji-id=6037254263187443802>💬</tg-emoji> Хостинг не разрешает, сорян. Пиши админам хостинга."\n  web_btn: "🌍 Веб-морда"\n  _cmd_doc_weburl: "Открыть туннель к вебу"\n  btn_yes: "🚸 Пофиг, давай"\n  btn_no: "🔻 Не надо"\n  lavhost_web: "✌️ <b>Это ссылка на веб Heroku на lavHost</b>\n\n<i>💡 Надо залогиниться данными от lavHost</i>"\n  invalid_target: "Реплайни на чела или тегни его нормально."\n  cant_add_self: "Себя добавить нельзя, шиз."\n  add_user_confirm: "Добавляем аккаунт {} ({})?"\n  add_user_insecure: "Добавляем аккаунт {} ({})? Юзай <code>{}addacc {} force_insecure</code> чтоб подтвердить."\n  enter_number: "Вводи номер"\n  your_phone_number: "Твой мобильник"\n  enter_code: "Код давай"\n  login_code: "Код для входа"\n  enter_2fa: "Пароль 2FA (облачный)"\n  your_2fa: "Твой 2FA пароль"\n  incorrect_number: "Номер кривой какой-то.\n\n"\n  enter_number_format: "Пиши номер в международном формате (+79212345678), понял?"\n  login_successful: "🎉 Залетел!"\n  floodwait_error: "Полегче, спам! Жди {} сек."\n  code_sent: "Код улетел. Пиши сюда"\n  invalid_code: "Код не тот. Давай по новой."\n  invalid_password: "Пароль не тот. Пробуй еще."\n  2fa_enabled: "У тебя 2FA стоит. Гони пароль."\n  request_code: "🔃 Дай код еще раз"\n  code_expired: "Код протух."\n\n  switch_confirm: "⚠️ <b>Точно переносим бота на другой акк?</b>\nТекущая сессия рипнется."\nYour current session will be closed."\n  switch_insecure: "🚫 <b>Перенос не стартанул:</b> нет инлайна. Пиши <code>{}switchacc force_insecure</code> если уверен."\n  _cmd_doc_switchacc: "Перенести юзербота на другой Telegram-аккаунт"\nheroku_backup:\n  period: "⌚️ <b>Юнит «ALPHA»</b> делает бэкапы (сейвы). Можно настроить.\n\nВыбери как часто сейвиться\n\n<b>🚫 Модули из файлов (.lm) так не восстановятся! Делай .backupmods перед этим.</b>"\n  saved: "✅ Запомнил! Поменять можно через <code>{prefix}set_backup_period</code>"\n  saved_bot: "✅ Запомнил! Поменять можно через {prefix}set_backup_period"\n  never: "✅ Ок, не буду сейвить автоматом. Вернуть: <code>{prefix}set_backup_period</code>"\n  never_bot: "✅ Ок, не буду сейвить автоматом. Вернуть: {prefix}set_backup_period"\n  invalid_args: "🚫 <b>Пиши часы цифрами, или `0` чтоб оффнуть</b>"\n  backup_caption: '<tg-emoji emoji-id=5469718869536940860>👆</tg-emoji> <b>Это бэкап базы. Не кидай никому, уведут акк. Восстановить:</b> <pre><code class="language-heroku">{prefix}restoredb</code></pre> <b>реплаем на файл.</b>'\n  backupall_info: '👆 <b>Это фулл бэкап (база + моды). Не сливай никому! Восстановить:</b> <pre><code class="language-heroku">{prefix}restoreall</code></pre> <b>реплаем на файл.</b>'\n  all_restored: "<tg-emoji emoji-id=5774134533590880843>🔄</tg-emoji> <b>Фулл бэкап накатил, ребутаюсь....</b>"\n  all_restored_bot: "🔄 Фулл бэкап накатил, ребутаюсь..."  \n  reply_to_file: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Реплайни на .json или .zip, ну</b>"\n  db_restored: "<tg-emoji emoji-id=5774134533590880843>🔄</tg-emoji> <b>Базу накатил, ребут...</b>"\n  modules_backup: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Бэкап модов ({})</b>\n\n<b>Восстановить:</b>\n<pre><code class=\"language-heroku\">{}restoremods</code></pre>"\n  mods_restored: "<tg-emoji emoji-id=5774134533590880843>🔄</tg-emoji> <b>Моды вернул, ребут</b>"\n  backup_sent: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Скинул бэкап в <a href={}>чат базы</a></b>"\n  backupall_sent: "<tg-emoji emoji-id=5431736674147114227>🗂</tg-emoji> <b>Дропнул бэкап базы и модулей в <a href={}>чат базы</a></b>"\n  db_warning: "❗️ О, бэкап от Hikka. <b>Попробую</b> переделать под Heroku.\nМожет кринжануть. Пробуем?"\n  advice_converting: "Можешь сам поменять <a>'hikka.'</a> на <a>'heroku.'</a> в файле. Так надо."\n  converting_db: "🔄 Шаманю над базой..."\n  probably_zip: "<tg-emoji emoji-id=5210952531676504517>❗️</tg-emoji> <b>Не вышло. Если это фулл бэкап (.zip/.backup), юзай</b> <code>{}restoreall</code> <b>реплаем.</b>"\n  _cls_doc: "Работает с бэкапами (сейвами)"\n  _cmd_doc_backupdb: "Сделать бэкап базы [придет в лс]"\n  _cmd_doc_backupmods: "Сделать бэкап модов [придет в лс]"\n  _cmd_doc_restoredb: "Накатить базу из файла"\n  _cmd_doc_restoremods: "<реплай на файл> - Накатить моды"\n  _cmd_doc_set_backup_period: "<часы> - Как часто сейвиться"\n  _cmd_doc_backupall: "Сделать общий бэкап (все вместе)"\n  _cmd_doc_restoreall: "Накатить общий бэкап"\n\npresets:\n  _fun_title: "🪩 Модули для рофлов"\n  _fun_desc: "Чисто покекать — анимации, спам, и прочий фан."\n  _chat_title: "👥 Для админов"\n  _chat_desc: "Тулзы чтоб держать чат в узде — фильтры, заметки, войсы и т.д."\n  _service_title: "⚙️ Полезные штуки"\n  _service_desc: "Реально нужные темы — аккаунт, ссылки, поиск."\n  _downloaders_title: "📥 Качалки"\n  _downloaders_desc: "Качать контент отовсюду — YouTube, TikTok, Spotify, VK и прочее."\n  welcome: "👋 <b>Ку! Задолбался искать модули? Вот тебе готовые паки. Если че, пиши /presets</b>"\n  preset: "<b>{}:</b>\nℹ️ <i>{}</i>\n\n⚒ <b>Че внутри:</b>\n\n{}"\n  back: "🔙 Назад"\n  install: "📦 Инсталл"\n  installing: "<tg-emoji emoji-id=5451732530048802485>⏳</tg-emoji> <b>Качаю пак </b><code>{}</code><b>...</b>"\n  installing_module: "<tg-emoji emoji-id=5451732530048802485>⏳</tg-emoji> <b>Качаю пак</b> <code>{}</code> <b>({}/{})...</b>\n\n<tg-emoji emoji-id=5188377234380954537>🪐</tg-emoji> <i>Ставлю модуль {}...</i>"\n  installed: "<tg-emoji emoji-id=5436040291507247633>🎉</tg-emoji> <b>Пак</b> <code>{}</code> <b>накатил!</b>"\n  already_installed: "✅ [Уже стоит]"\n  add_to_folder_usage: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Укажите папку для добави модуля 📁 </b> <code>{prefix}addtofolder <папка> <модуль></code>"\n  already_in_fo