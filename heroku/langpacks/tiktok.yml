пиши <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Надо Windows 10 (2004+) или 11 и виртуализацию.</i>\n\n⬜️ <b>Ребутни комп и открой Ubuntu 22.04.x</b> \n\n⬜️ <b>Вставь это (ПКМ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>Если желтым ругается, пиши</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code>\n\n⬜️ <b>Вставь это (ПКМ):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>API_ID и API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Видос тут</a>"\n  userland_install: "<b>Качай UserLAnd тут:</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">ссылка</a>\n\n<b>Открывай, тыкай Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Жди, пей чай</b>\n\n<b>Как откроется консоль, пиши:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>В конце будет ссылка, переходи и логинься.\n\nВуаля! Ты хакер на телефоне.</b>"\n  jamhost_install: "🪐 <b>JamHost (база):</b>\n\n<b>Иди в @jamhostbot, пиши </b><code>/pay</code><b> и делай че он скажет.</b>"\n  hikkahost_install: "<b>🌘 HikkaHost:</b>\n\n1. Иди в @hikkahost_bot\n2. Жми «Установить»\n3. Жми «🪐 Heroku»\n\nИ делай дальше.\n\n<b>Получишь ссылку, логинься и кайфуй.</b>"\n  lavhost_install: "⬇️ lavHost:\n\n• Иди в @lavhostbot, пиши /buy, плати\n• Кидай чек если надо\n• Потом /install и выбирай Heroku\n• Делай че бот скажет"\n  too_many_args: "<tg-emoji emoji-id=5210952531676504517>🚫</tg-emoji> <b>Много букв, короче пиши</b>"\n  blacklisted: "<tg-emoji emoji-id=5197474765387864959>👍</tg-emoji> <b>Чат {} в мусорке (ЧС)</b>"\n  unblack