  _cfg_cst_btn: "Bouton personnalisé pour les infos. Laisser vide pour supprimer le bouton"
  _cfg_banner: "URL vers l'image bannière"
  desc: "<emoji document_id=5188377234380954537>🪐</emoji> <b>Userbot — qu'est-ce que c'est ?</b>\n\n<emoji document_id=5472238129849048175>😎</emoji> Un userbot désigne un <b>programme tiers</b> qui interagit avec l'API Telegram pour effectuer des <b>tâches automatisées au nom d'un utilisateur</b>. Ces userbots peuvent être utilisés pour automatiser diverses tâches telles que <b>l'envoi de messages, rejoindre des chaînes, télécharger des médias, et bien plus encore</b>.\n\n<emoji document_id=5474667187258006816>😎</emoji> Les userbots sont différents des bots Telegram réguliers car <b>ils fonctionnent sur le compte de l'utilisateur</b> plutôt que sur un compte bot. Cela signifie que les userbots peuvent accéder à plus de fonctionnalités et avoir une plus grande flexibilité en termes d'actions qu'ils peuvent effectuer.\n\n<emoji document_id=5472267631979405211>🚫</emoji> Cependant, il est important de noter que <b>les userbots ne sont pas officiellement supportés par Telegram</b> et leur utilisation peut violer les conditions d'utilisation de la plateforme. En tant que tel, <b>les utilisateurs doivent faire preuve de prudence lors de l'utilisation de userbots</b> et s'assurer qu'ils ne sont pas utilisés à des fins malveillantes.\n\n"
  no_font: "<emoji document_id=5465665476971471368>❌</emoji> Où est le lien ou la réponse vers la police ?"  
  no_banner: "<emoji document_id=6010394680179562842>😶</emoji> <b>Rien n'a été trouvé au lien spécifié </b><code>{link></code><b>.\n\nVérifiez l'intégrité de votre fichier au lien, et assurez-vous aussi que le lien pointe directement vers le fichier.</b>"
  font_installed: "<emoji document_id=5436040291507247633>🎉</emoji> <b>Police installée avec succès !</b>\n<emoji document_id=5436040291507247633>🎉</emoji> <i>Vous pouvez maintenant en profiter.</i>"  
  incorrect_format_font: "<emoji document_id=5465665476971471368>❌</emoji> <b>Format de police invalide !</b>\n<blockquote>Formats supportés -> otf, ttf</blockquote>"  
  incorrect_img_format: "<emoji document_id=5465665476971471368>❌</emoji> <b>Format d'image invalide</b>\n<blockquote>Formats supportés -> jpg, jpeg, png, bmp, webp</blockquote>"
