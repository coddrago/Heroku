  base: "🪐 <b>Bonjour.</b> Votre userbot <b>Heroku</b> est maintenant installé.\n\n❓ <b>Besoin d'aide ?</b> Rejoignez <a href=\"https://t.me/heroku_talks\">notre chat de support</a>. Nous aidons <b>tout le monde</b>.\n\n💁‍♀️ <b>Guide Rapide :</b>\n\n1️⃣ <b>Écrivez</b> <code>.help</code> <b>pour voir la liste des modules</b>\n2️⃣ <b>Écrivez</b> <code>.help &lt;Nom du module/commande&gt;</code> <b>pour voir la description du module</b>\n3️⃣ <b>Écrivez</b> <code>.dlmod &lt;lien&gt;</code> <b>pour charger un module depuis un lien</b>\n4️⃣ <b>Écrivez</b> <code>.loadmod</code> <b>en réponse à un fichier pour charger un module depuis celui-ci</b>\n5️⃣ <b>Écrivez</b> <code>.unloadmod &lt;Nom du module&gt;</code> <b>pour décharger un module</b>\n\n💡 <b>Heroku supporte les modules de Hikka, Friendly-Telegram, et GeekTG, ainsi que les siens.</b>\n"
