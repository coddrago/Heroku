settings:
  name: "Settings"
  vds: "💎 VDS"
  wsl: "💻 WSL"
  userland: "🐧 UserLand"
  jamhost: "🧃 JamHost"
  hikkahost: "🌼 HikkaHost"
  lavhost: "✌️ lavHost"
  choose_installation: "<emoji document_id=5363805650327450240>🪐</emoji> <b>Choisissez votre option d'installation Heroku :</b>"
  vds_install: "<emoji document_id=5471952986970267163>💎</emoji> Le processus d'installation sur un VDS se fait avec une seule commande :\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Note : Si vous n'avez pas les privilèges sudo, omettez la partie correspondante de la commande.</i>"
  wsl_install: "<b>Téléchargez WSL.</b> Pour ce faire, ouvrez PowerShell en tant qu'administrateur et tapez <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Pour installer WSL, vous avez besoin de Windows 10 build 2004 ou Windows 11 de n'importe quelle version et d'un PC prenant en charge la virtualisation. Pour l'installation sur des versions antérieures de l'OS, référez-vous à</i> <a href=\"https://learn.microsoft.com/fr-fr/windows/wsl/install-manual\">cette page</a>\n\n⬜️ <b>Redémarrez votre PC et lancez l'application Ubuntu 22.04.x</b> \n\n⬜️ <b>Collez la commande dedans (Clic droit) :</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>Si des avertissements jaunes apparaissent, tapez</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>en remplaçant /home/username/.local/bin par le chemin mentionné dans le message</i>\n\n⬜️ <b>Collez la commande (Clic droit) :</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Où obtenir API_ID et API_HASH ?</b> : <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Vidéo</a>"
  userland_install: "<b>Installez UserLAnd depuis ce</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">lien</a>\n\n<b>Ouvrez-le, sélectionnez Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Attendez que la distribution s'installe, vous pouvez vous servir un thé</b>\n\n<b>Après une installation réussie, un terminal s'ouvrira devant vous, tapez :</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>À la fin de l'installation, un lien apparaîtra, suivez-le et entrez les détails de votre compte pour vous connecter.\n\nVoilà ! Vous avez installé Heroku sur UserLAnd.</b>"
  jamhost_install: "🪐 <b>Installation sur 🧃 JamHost :</b>\n\n<b>Allez sur @jamhostbot, tapez </b><code>/pay</code><b> et suivez ses instructions.</b>"
  hikkahost_install: "<b>🌘 Comment installer Heroku sur HikkaHost ?</b>\n\n1. Allez sur @hikkahost_bot\n2. Sélectionnez \"Install\"\n3. Sélectionnez \"🪐 Heroku\"\n\nEt continuez l'installation.\n\n<b>Après cela, vous recevrez un lien, ouvrez-le et connectez-vous à votre compte.</b>"
  lavhost_install: "⬇️ Pour installer, allez simplement sur @lavhostbot et suivez ces étapes :\n\n• Entrez la commande /buy, sélectionnez et payez la facture\n• Si nécessaire, envoyez le reçu de paiement\n• Après confirmation du paiement, entrez /install et sélectionnez Heroku\n• Suivez les instructions du bot"
  too_many_args: "<emoji document_id=5210952531676504517>🚫</emoji> <b>Trop d'arguments</b>"
  blacklisted: "<emoji document_id=5197474765387864959>👍</emoji> <b>Chat {} mis sur liste noire du userbot</b>"
